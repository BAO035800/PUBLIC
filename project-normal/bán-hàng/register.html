<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="../../font-awesome-6.6.0-pro-full-main/css/all.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container-fluid p-5 text-center bg-light vh-100 d-flex align-items-center justify-content-center">
        <div class="container bg-white shadow-lg pt-5 pb-5 w-50 rounded-5">
            <img src="logo-personal-01.svg" class="text-center m-2" alt="logo" width="150" height="150">
            <p class="fw-bold text-mute fs-2"> Đăng kí</p>
            <form class="d-flex justify-content-center row">
                <div class="m-3 input-group w-50 ">
                    <span class="input-group-text" style=" color:#1272b7;border:1px solid #d3d4d5;background :transparent">
                        <i class="fa-light fa-user"></i>
                    </span>
                    <input type="text" class="form-control" placeholder="Tên đăng nhập" >
                </div>
                <div class="input-group w-50 ">
                    <span class="input-group-text" style=" color:#1272b7;border:1px solid #d3d4d5;background :transparent">
                        <i class="fa-light fa-lock"></i>
                    </span>
                    <input type="password" class="form-control" placeholder="Mật khẩu" >
                </div>
                <div class="m-3 input-group w-50">
                    <span class="input-group-text" style="color:#1272b7; border:1px solid #d3d4d5; background: transparent;">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control" placeholder="Nhập lại mật khẩu" name="confirm_password" id="confirm_password" required>
                </div>
            </form>
            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-primary w-40 m-3">Đăng kí</button>
                <button type="submit" class="btn btn-danger w-40 m-3">Trang chủ</button>
            </div>
            <div class="d-flex justify-content-center row">
                <p class="fs-6 mb-2">Bạn đã có tài khoản hãy <a href="login.html" class="text-decoration-none ">Đăng nhập</a></p>
                <a href="#" class="text-decoration-none fs-7 text-danger">Quên mật khẩu</a>
            </div>
        </div>
    </div>
</body>
</html>
